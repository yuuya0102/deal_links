<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 お得情報リンク集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }
    .header {
      text-align: center;
      padding: 24px 0 8px;
    }
    .header h1 {
      font-size: 1.5rem;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .updated {
      font-size: 0.75rem;
      color: #888;
      margin-top: 6px;
    }
    .header .retention-info {
      font-size: 0.65rem;
      color: #666;
      margin-top: 3px;
    }
    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 480px;
      margin: 20px auto 0;
    }
    .card {
      display: flex;
      flex-direction: row;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .card:active { transform: scale(0.97); }
    .card.expired {
      opacity: 0.3;
      pointer-events: none;
    }
    .card-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 8px;
      z-index: 2;
    }
    .card-img {
      width: 110px;
      min-height: 110px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-body {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      min-width: 0;
    }
    .card-source {
      font-size: 0.65rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .card-name {
      font-size: 0.85rem;
      font-weight: 700;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
    }
    .tag-badge {
      font-size: 0.6rem;
      background: rgba(255, 210, 0, 0.15);
      color: #ffd200;
      border: 1px solid rgba(255, 210, 0, 0.3);
      padding: 1px 6px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .card-price {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 8px;
    }
    .price-current {
      font-size: 1.1rem;
      font-weight: 700;
      color: #ffd200;
    }
    .price-original {
      font-size: 0.75rem;
      color: #777;
      text-decoration: line-through;
    }
    .card-cta {
      font-size: 0.75rem;
      color: #ffd200;
      font-weight: 700;
    }
    .empty-msg {
      text-align: center;
      color: #888;
      margin-top: 40px;
      font-size: 0.9rem;
      display: none;
    }
    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 0.7rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔥 お得情報リンク集</h1>
    <div class="updated">最終更新: 2026/03/10 16:20</div>
    <div class="retention-info">※ 商品は掲載から24時間後に自動的に非表示になります</div>
  </div>
  <div class="cards" id="deal-cards">
    
    <a href="https://hb.afl.rakuten.co.jp/hgc/51a3313f.71d90aa8.51a33140.0972e653/?pc=https%3A%2F%2Fitem.rakuten.co.jp%2Fiberico-ya%2Fzanmai%2F%3FvariantId%3Dzanmai&amp;m=https%3A%2F%2Fitem.rakuten.co.jp%2Fiberico-ya%2Fzanmai%2F%3FvariantId%3Dzanmai" class="card" target="_blank" rel="noopener" data-added="2026-03-10T16:20:48.074695">
      <div class="card-badge">40% OFF</div>
      <div class="card-img"><img src="https://tshop.r10s.jp/iberico-ya/cabinet/img_product/zanmai/zanmai6_t1.jpg?fitin=275:275" alt="【40%OFF スーパーSALE】 イベリコ豚 人気 詰め合わせ 6種類 三昧 50％OFF タイムセール 人気 福袋 2026 大容量 約1.6kg ローストポーク 食品 特価 冷凍 送料無料 イベリコ屋" loading="lazy"></div>
      <div class="card-body">
        <div class="card-source">Rakuten</div>
        <div class="card-name">【40%OFF スーパーSALE】 イベリコ豚 人気 詰め合わせ 6種類 三昧 50％OFF タイムセール 人気 福袋 2026 大容量 約1.6kg ローストポーク 食品 特価 冷凍 送料無料 イベリコ屋</div>
        
        <div class="card-price">
          <span class="price-current">¥6,600</span>
          <span class="price-original">¥11,000</span>
        </div>
        <div class="card-cta">🛒 購入ページへ</div>
      </div>
    </a>
  </div>
  <div class="empty-msg" id="empty-msg">現在表示可能なお得情報はありません。次回の更新をお待ちください。</div>
  <div class="footer">自動更新されるお得情報リンク集</div>

  <script>
    // 掲載から 24 時間を超えた商品を自動非表示にする
    (function() {
      var RETENTION_MS = 24 * 60 * 60 * 1000;
      var now = Date.now();
      var cards = document.querySelectorAll('.card[data-added]');
      var visibleCount = 0;
      cards.forEach(function(card) {
        var added = new Date(card.getAttribute('data-added')).getTime();
        if (now - added > RETENTION_MS) {
          card.classList.add('expired');
        } else {
          visibleCount++;
        }
      });
      if (visibleCount === 0) {
        document.getElementById('empty-msg').style.display = 'block';
      }
    })();
  </script>
</body>
</html>
